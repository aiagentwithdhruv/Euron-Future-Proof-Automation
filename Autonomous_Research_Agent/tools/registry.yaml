# Tool Registry — Autonomous Research Agent
# The agent consumes this to know what tools exist and how to invoke them.

tools:
  fetch_competitor:
    description: "Fetch a competitor's public pages (homepage + pricing + blog + about). Respects robots.txt, rate-limits 3s, strips PII."
    file: tools/fetch_competitor.py
    inputs:
      name: {type: string, required: true}
      url: {type: string_list, required: true, description: "Repeatable --url"}
      rate-limit: {type: float, default: 3.0}
      timeout: {type: int, default: 15}
    outputs:
      file: ".tmp/fetch/{name}_site.json"
      format: "JSON: competitor, pages[], counts"
    cost: "$0 (requests + bs4)"
    requires: []

  fetch_news:
    description: "Fetch news mentions for a competitor — NewsAPI + Tavily."
    file: tools/fetch_news.py
    inputs:
      name: {type: string, required: true}
      keywords: {type: string, required: true, description: "Comma-separated"}
      days: {type: int, default: 7}
      limit: {type: int, default: 15}
    outputs:
      file: ".tmp/fetch/{name}_news.json"
    cost: "$0 (NewsAPI free tier + Tavily free tier)"
    requires: []
    optional: [NEWSAPI_KEY, TAVILY_API_KEY]

  fetch_social:
    description: "Fetch social signals via Tavily site: filters. Best-effort, free tier only."
    file: tools/fetch_social.py
    inputs:
      name: {type: string, required: true}
      handles: {type: string, required: true, description: '"twitter:x,linkedin:y"'}
      days: {type: int, default: 7}
      limit: {type: int, default: 8}
    outputs:
      file: ".tmp/fetch/{name}_social.json"
    cost: "$0 (Tavily free)"
    optional: [TAVILY_API_KEY]

  snapshot_diff:
    description: "Build current snapshot from fetched files and diff vs previous snapshot. Snapshot = source of truth."
    file: tools/snapshot_diff.py
    inputs:
      name: {type: string, required: true}
      current-files: {type: string, required: true, description: "Comma-separated paths"}
      previous-snapshot: {type: string, required: false}
      save: {type: bool, default: false}
    outputs:
      diff_file: ".tmp/diff/{name}.json"
      snapshot_file: "data/snapshots/{name}.json (if --save)"
    cost: "$0"
    requires: []

  analyze_changes:
    description: "Classify + rank diffs with LLM (Euri → OpenRouter), rule-based fallback."
    file: tools/analyze_changes.py
    inputs:
      diffs: {type: string, required: true}
      business-context: {type: string, default: "AI automation platforms"}
      top: {type: int, default: 5}
      no-llm: {type: bool, default: false}
      run-id: {type: string, required: false}
    outputs:
      file: ".tmp/insights.json"
    cost: "~$0.02 per run (free on Euri)"
    optional: [EURI_API_KEY, OPENROUTER_API_KEY]

  write_report:
    description: "Render the weekly markdown report. LLM-authored with template fallback."
    file: tools/write_report.py
    inputs:
      insights: {type: string, default: ".tmp/insights.json"}
      output: {type: string, default: ".tmp/report.md"}
      no-llm: {type: bool, default: false}
      run-id: {type: string, required: false}
    outputs:
      file: ".tmp/report.md"
    cost: "~$0.02 per run (free on Euri)"
    optional: [EURI_API_KEY, OPENROUTER_API_KEY]

  deliver_report:
    description: "Deliver report to Slack + Email (Resend) + Telegram. Skips channels with missing creds."
    file: tools/deliver_report.py
    inputs:
      report: {type: string, required: true}
      channels: {type: string, default: "slack,email,telegram"}
      dry-run: {type: bool, default: false}
    outputs:
      format: "JSON receipts per channel"
    cost: "$0"
    optional:
      slack: [SLACK_WEBHOOK_URL]
      email: [RESEND_API_KEY, EMAIL_FROM, EMAIL_TO]
      telegram: [TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID]

  run_research:
    description: "End-to-end orchestrator: load competitors → fetch → diff → analyze → report → deliver → log."
    file: tools/run_research.py
    inputs:
      competitors: {type: string, default: "config/competitors.yaml"}
      dry-run: {type: bool, default: false}
      no-llm: {type: bool, default: false}
      rate-limit: {type: float, default: 3.0}
      top: {type: int, default: 5}
      channels: {type: string, default: "slack,email,telegram"}
    outputs:
      report: ".tmp/report.md"
      insights: ".tmp/insights.json"
      snapshots: "data/snapshots/{name}.json"
      run_log: "runs/YYYY-MM-DD-research-cycle.md"
    cost: "≤ $1.00/run (hard cap, abort on breach)"

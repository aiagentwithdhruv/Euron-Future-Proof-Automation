# Tool → required/optional env vars mapping.
# Used for documentation; env_loader reads the actual .env file.

tools:
  fetch_competitor:
    required: []
    optional: []
  fetch_news:
    required: []
    optional: [NEWSAPI_KEY, TAVILY_API_KEY]
  fetch_social:
    required: []
    optional: [TAVILY_API_KEY, APIFY_API_TOKEN]
  analyze_changes:
    required: []
    optional: [EURI_API_KEY, OPENROUTER_API_KEY]
  write_report:
    required: []
    optional: [EURI_API_KEY, OPENROUTER_API_KEY]
  deliver_report:
    required: []
    optional:
      slack: [SLACK_WEBHOOK_URL]
      email: [RESEND_API_KEY, EMAIL_FROM, EMAIL_TO]
      telegram: [TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID]

# Maps each tool to the environment variables it requires.
# The agent checks this before running a tool.

tools:
  fetch_news:
    requires: [NEWSAPI_KEY]
    optional: [TAVILY_API_KEY]
  rank_news:
    requires: []           # Falls back to keyword scoring if no LLM key
    optional: [EURI_API_KEY, OPENROUTER_API_KEY]
  format_message:
    requires: []           # Pure formatting, no external calls
  send_telegram:
    requires: [TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID]
